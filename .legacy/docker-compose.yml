services:
  postgres:
    image: postgres:latest
    container_name: filmsCrud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: filmsCrud
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql

  web:
    build: ./filmoviCrud
    container_name: filmsCrud-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: >
        Host=postgres;
        Port=5432;
        Database=filmsCrud;
        Username=postgres;
        Password=postgres

  pgadmin:
    image: dpage/pgadmin4
    container_name: filmsCrud-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin

volumes:
  postgres-data:
